<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="todo-container shadow">
    <h3 class="text-center mb-3">To-Do App by Yash</h3>

    <div class="input-group mb-3">
        <input type="text" id="taskInput" class="form-control" placeholder="Enter Name :- ">
        <button class="btn btn-primary" onclick="addTask()">Add</button>
    </div>

    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search Name here :- ">

    <p id="taskCounter" class="text-end fw-bold">Total Names :- 0</p>

    <ul class="list-group" id="taskList"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
